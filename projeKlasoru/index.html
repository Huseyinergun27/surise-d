<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senin S³rprizin</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #000000;
    font-family: Arial, sans-serif;
}

.heart-button {
    position: relative;
    width: 120px;
    height: 120px;
    background-color: #ff1a1a;
    transform: rotate(-45deg);
    cursor: pointer;
    border: none;
    outline: none;
    transition: transform 0.2s ease;
}
.heart-button::before,
.heart-button::after {
    content: "";
    position: absolute;
    width: 120px;
    height: 120px;
    background-color: #ff1a1a;
    border-radius: 50%;
}
.heart-button::before { top: -60px; left: 0; }
.heart-button::after { left: 60px; top: 0; }

.heart-text {
    margin-top: 20px;
    color: white;
    font-size: 1.5rem;
    font-weight: bold;
    text-align: center;
}
</style>
</head>
<body>
    <button class="heart-button" onclick="window.location.href='surprise.html'"></button>
    <div class="heart-text">KALBE DOKUN</div>

<script>
const heartBtn = document.querySelector('.heart-button');
heartBtn.addEventListener('click', () => {
    heartBtn.style.transform = 'rotate(-45deg) scale(1.3)';
    setTimeout(() => {
        heartBtn.style.transform = 'rotate(-45deg) scale(1)';
    }, 200);
});
</script>
</body>
</html>
